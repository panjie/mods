version: 2

project_name: mods

builds:
  - id: mods
    main: .
    binary: mods
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version=v{{ .Version }} -X main.CommitSHA={{ .FullCommit }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: binaries
    ids:
      - mods
    formats: tar.gz
    format_overrides:
      - goos: windows
        formats: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

source:
  enabled: false

release:
  github:
    owner: panjie
    name: mods
