name: nightly

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
      DOCKER_ENABLED: ${{ secrets.DOCKERHUB_USERNAME != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          check-latest: true

      - uses: docker/setup-qemu-action@v3
        if: env.DOCKER_ENABLED == 'true'

      - uses: docker/setup-buildx-action@v3
        if: env.DOCKER_ENABLED == 'true'

      - name: ghcr.io login
        uses: docker/login-action@v3
        if: env.DOCKER_ENABLED == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker.io login
        uses: docker/login-action@v3
        if: env.DOCKER_ENABLED == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIGHTLY_TAG: nightly
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.zip dist/checksums.txt)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist" >&2
            exit 1
          fi

          git tag -f "$NIGHTLY_TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$NIGHTLY_TAG"

          notes_file="$(mktemp)"
          cat >"$notes_file" <<EOF
          Nightly build from \`${GITHUB_SHA}\`.

          This prerelease is overwritten on every push to \`main\`.
          EOF

          if gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
            while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              gh release delete-asset "$NIGHTLY_TAG" "$asset" --yes
            done < <(gh release view "$NIGHTLY_TAG" --json assets --jq '.assets[].name')

            gh release edit "$NIGHTLY_TAG" \
              --title "Nightly build" \
              --notes-file "$notes_file" \
              --prerelease \
              --target "$GITHUB_SHA"
          else
            gh release create "$NIGHTLY_TAG" \
              --title "Nightly build" \
              --notes-file "$notes_file" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$NIGHTLY_TAG" "${assets[@]}" --clobber
          echo "Nightly release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${NIGHTLY_TAG}" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          retention-days: 30
          name: dist
          path: dist
