# {{ index .Help "api" }}
default-api: openai
# {{ index .Help "model" }}
default-model: gpt-5

# ── Formatting ────────────────────────────────────────────────────

# {{ index .Help "format-text" }}
format-text:
  markdown: '{{ index .Config.FormatText "markdown" }}'
  json: '{{ index .Config.FormatText "json" }}'

# {{ index .Help "format" }}
format: false

# {{ index .Help "minimal" }}
minimal: false

# ── Roles ─────────────────────────────────────────────────────────

# {{ index .Help "roles" }}
roles:
  "default": []
  # Example, a role called `shell`:
  # shell:
  #   - you are a shell expert
  #   - you do not explain anything
  #   - you simply output one liners to solve the problems you're asked
  #   - you do not provide any explanation whatsoever, ONLY the command

# {{ index .Help "role" }}
role: "default"

# ── Display & Output ──────────────────────────────────────────────

# {{ index .Help "raw" }}
raw: false

# {{ index .Help "quiet" }}
quiet: false

# {{ index .Help "word-wrap" }}
word-wrap: 80

# {{ index .Help "prompt-args" }}
include-prompt-args: false

# {{ index .Help "prompt" }}
include-prompt: 0

# {{ index .Help "theme" }}
theme: charm

# {{ index .Help "fanciness" }}
fanciness: 10

# {{ index .Help "status-text" }}
status-text: Generating

# ── Model Parameters ──────────────────────────────────────────────

# {{ index .Help "temp" }}
temp: 1.0

# {{ index .Help "topp" }}
topp: 1.0

# {{ index .Help "topk" }}
topk: 50

# {{ index .Help "max-input-chars" }}
max-input-chars: 12250

# {{ index .Help "max-tokens" }}
# max-tokens: 100

# {{ index .Help "max-completion-tokens" }}
max-completion-tokens: 100

# {{ index .Help "no-limit" }}
no-limit: false

# {{ index .Help "max-retries" }}
max-retries: 5

# {{ index .Help "max-tool-rounds" }}
max-tool-rounds: 30

# {{ index .Help "reasoning" }}
reasoning: off

# {{ index .Help "review" }}
review-mode: mutable

# Fine-grained control over tool execution review heuristics.
# When review-mode is mutable or always, these lists determine which
# shell commands are auto-approved (harmless) versus require confirmation
# (matching a dangerous pattern).
review:
  shell:
    # Commands that are always safe and bypass review.
    harmless-commands:
      - ack
      - ag
      - apropos
      - bat
      - cat
      - cmp
      - comm
      - cut
      - column
      - date
      - df
      - diff
      - dir
      - du
      - echo
      - egrep
      - env
      - fgrep
      - file
      - find
      - fuser
      - grep
      - groups
      - head
      - hostname
      - id
      - last
      - less
      - locate
      - ls
      - lsof
      - man
      - more
      - ncdu
      - od
      - pgrep
      - printenv
      - printf
      - ps
      - pwd
      - readlink
      - realpath
      - rev
      - rg
      - sdiff
      - sort
      - stat
      - tail
      - tree
      - tr
      - type
      - uname
      - uniq
      - uptime
      - vdir
      - w
      - wc
      - whatis
      - whereis
      - which
      - who
      - whoami
      - xxd
    # Git subcommands that are read-only and bypass review.
    harmless-git-commands:
      - blame
      - bisect
      - branch
      - config
      - describe
      - diff
      - grep
      - log
      - ls-files
      - ls-tree
      - reflog
      - remote
      - rev-list
      - rev-parse
      - shortlog
      - show
      - status
      - tag
      - whatchanged
      - worktree
    # Shell command patterns that trigger review.
    dangerous-patterns:
      - ">"
      - ">>"
      - " rm "
      - rmdir
      - unlink
      - " mv "
      - "chmod "
      - "chown "
      - "mkdir "
      - " kill"
      - killall
      - pkill
      - "sudo "
      - "| sh"
      - "|sh"
      - "| bash"
      - "|bash"
      - " dd "
      - " cp "
      - " ln -"
      - "install "
      - mount
      - umount
      - "tar "
      - gzip
      - bzip2
      - "zip "
      - compress
      - apt-get
      - "apt "
      - "yum "
      - "dnf "
      - "brew "
      - "pip "
      - "pip3 "
      - "npm "
      - "cargo "
      - "gem "
      - go install
      - go get
      - go build
      - go run
      - go mod
      - make
      - ninja
      - cmake
      - git add
      - git commit
      - git push
      - git pull
      - git merge
      - git rebase
      - git checkout
      - git reset
      - git clean
      - "git branch -d"
      - "git tag -d"
      - git remote add
      - git remote remove
      - "sed -i"
      - "perl -i"
      - "tee "
      - "scp "
      - "rsync "
      - "ssh "
      - "curl "
      - "wget "
      - "openssl "
      - shutdown
      - reboot
      - halt
      - poweroff
      - "truncate "

# ── Tool & MCP Configuration ──────────────────────────────────────

# {{ index .Help "mcp-servers" }}
mcp-servers:
  # Example: GitHub MCP via Docker:
  # github:
  #   command: docker
  #   env:
  #     - GITHUB_PERSONAL_ACCESS_TOKEN=xxxyyy
  #   args:
  #     - run
  #     - "-i"
  #     - "--rm"
  #     - "-e"
  #     - GITHUB_PERSONAL_ACCESS_TOKEN
  #     - "ghcr.io/github/github-mcp-server"

# {{ index .Help "mcp-timeout" }}
mcp-timeout: 15s

# {{ index .Help "builtin-tools" }}
builtin-tools:
  filesystem: auto
  shell: false
  sequential-thinking: false
  shell-timeout: 30s
  shell-max-output: 20000

# {{ index .Help "web-search" }}
web-search: false

# {{ index .Help "web-search-provider" }}
# Supported: duckduckgo (default), tavily, custom
web-search-provider: duckduckgo

# {{ index .Help "web-search-api-key" }}
# web-search-api-key:

# ── Images ────────────────────────────────────────────────────────

# {{ index .Help "image" }}
# images: []

# {{ index .Help "stdin-image" }}
# stdin-image: false

# {{ index .Help "clipboard-image" }}
# clipboard-image: false

# ── Debug ─────────────────────────────────────────────────────────

# {{ index .Help "debug" }}
debug: false

# ══════════════════════════════════════════════════════════════════
#                               APIs
# ══════════════════════════════════════════════════════════════════

# {{ index .Help "apis" }}
apis:

  # ── Major Cloud Providers ─────────────────────────────────────

  openai:
    base-url: https://api.openai.com/v1
    api-key:
    api-key-env: OPENAI_API_KEY
    # api-key-cmd executes a shell command to retrieve the API key at runtime.
    # WARNING: Avoid using this with untrusted or shared config files, as the
    # command is executed via the shell. Prefer api-key-env when possible.
    # api-key-cmd: rbw get -f OPENAI_API_KEY chat.openai.com
    models:
      gpt-5.2:
        aliases: ["5.2", "gpt5.2", "gpt-5-2"]
        max-input-chars: 794000
        fallback: gpt-5
      gpt-5:
        aliases: ["5", "gpt5"]
        max-input-chars: 794000
        fallback: gpt-4.1
      gpt-4.1:
        aliases: ["4.1", "gpt4.1", "gpt-4-1"]
        max-input-chars: 4000000
        fallback: gpt-5
      o4-mini:
        aliases: ["o4", "o4m", "o4-mini"]
        max-input-chars: 794000
      o3:
        aliases: ["o3"]
        max-input-chars: 794000

  google:
    models:
      gemini-3.5-flash:
        aliases: ["gm3.5f", "gemini-3.5-flash"]
        max-input-chars: 4194304
      gemini-3.1-pro:
        aliases: ["gm3.1p", "gemini-3.1-pro"]
        max-input-chars: 4194304
      gemini-2.5-pro:
        aliases: ["gm2.5p", "gemini-2.5-pro"]
        max-input-chars: 4194304

  anthropic:
    base-url: https://api.anthropic.com/v1
    api-key:
    api-key-env: ANTHROPIC_API_KEY
    models:
      claude-sonnet-4-20250514:
        aliases: ["claude-sonnet-4", "sonnet-4"]
        max-input-chars: 680000
      claude-opus-4-1-20250805:
        aliases: ["claude-opus-4.1", "opus-4.1", "opus-4-1", "opus"]
        max-input-chars: 680000
      claude-3-5-haiku-20241022:
        aliases: ["claude3.5-haiku", "haiku"]
        max-input-chars: 680000

  # ── Enterprise / Alternative ──────────────────────────────────

  azure:
    base-url: https://YOUR_RESOURCE_NAME.openai.azure.com
    api-key:
    api-key-env: AZURE_OPENAI_KEY
    models:
      gpt-4o:
        aliases: ["az4o"]
        max-input-chars: 24500

  deepseek:
    base-url: https://api.deepseek.com/
    api-key:
    api-key-env: DEEPSEEK_API_KEY
    models:
      deepseek-v4-flash:
        aliases: ["v4-flash", "flash", "deepseek-chat", "chat"]
        max-input-chars: 4000000
        fallback: deepseek-v4-pro
      deepseek-v4-pro:
        aliases: ["v4-pro", "pro", "deepseek-reasoner", "r1"]
        max-input-chars: 4000000

  # ── Multi-provider Aggregator ─────────────────────────────────

  openrouter:
    base-url: https://openrouter.ai/api/v1
    api-key:
    api-key-env: OPENROUTER_API_KEY
    models:
      deepseek/deepseek-v4-flash:
        aliases: ["or-v4-flash"]
        max-input-chars: 4000000
      anthropic/claude-sonnet-4:
        aliases: ["or-sonnet-4"]
        max-input-chars: 680000
      google/gemini-3.1-pro:
        aliases: ["or-gemini-3.1-pro"]
        max-input-chars: 4194304

  # ── Local / Self-hosted ───────────────────────────────────────

  ollama:
    base-url: http://localhost:11434
    models:
      "llama4:16x17b":
        aliases: ["llama4", "scout"]
        max-input-chars: 1600000
      "llama3.3:70b":
        aliases: ["llama3.3", "llama3.3-70b"]
        max-input-chars: 392000
      "qwen2.5:7b":
        aliases: ["qwen2.5", "qwen"]
        max-input-chars: 392000
      "mistral:7b":
        aliases: ["mistral"]
        max-input-chars: 392000

  # Example: custom OpenAI-compatible server
  # custom:
  #   base-url: https://your-server.com/v1
  #   api-key:
  #   api-key-env: CUSTOM_API_KEY
  #   models:
  #     your-model:
  #       aliases: ["ym"]
  #       max-input-chars: 100000
