# {{ index .Help "api" }}
default-api: openai
# {{ index .Help "model" }}
default-model: gpt-4o-mini

# ── Formatting ────────────────────────────────────────────────────

# {{ index .Help "format-text" }}
format-text:
  markdown: '{{ index .Config.FormatText "markdown" }}'
  json: '{{ index .Config.FormatText "json" }}'

# {{ index .Help "format" }}
format: false

# {{ index .Help "format-as" }}
# format-as: ""  # empty = let mods decide based on format-text keys

# {{ index .Help "minimal" }}
minimal: false

# ── Roles ─────────────────────────────────────────────────────────

# {{ index .Help "roles" }}
roles:
  "default": []
  # Example, a role called `shell`:
  # shell:
  #   - you are a shell expert
  #   - you do not explain anything
  #   - you simply output one liners to solve the problems you're asked
  #   - you do not provide any explanation whatsoever, ONLY the command

# {{ index .Help "role" }}
role: "default"

# ── Built-in Prompt Overrides ─────────────────────────────────────

# {{ index .Help "prompts" }}
prompts:
  identity: ""
  tool-selection: ""
  plan: ""
  reasoning-classifier: ""
  shell-classifier: ""

# ── Display & Output ──────────────────────────────────────────────

# {{ index .Help "raw" }}
raw: false

# {{ index .Help "quiet" }}
quiet: false

# {{ index .Help "hide-tool-status" }}
hide-tool-status: false

# {{ index .Help "hide-tool-results" }}
hide-tool-results: true

# {{ index .Help "word-wrap" }}
word-wrap: 80

# {{ index .Help "theme" }}
theme: charm

# {{ index .Help "status-text" }}
status-text: Generating

# ── Model Parameters ──────────────────────────────────────────────

# {{ index .Help "temp" }}
temp: 1.0

# {{ index .Help "topp" }}
topp: 1.0

# {{ index .Help "topk" }}
topk: 50

# {{ index .Help "stop" }}
# stop: []

# {{ index .Help "max-input-chars" }}
max-input-chars: 12250

# {{ index .Help "max-tokens" }}
# max-tokens: 100

# {{ index .Help "no-limit" }}
no-limit: false

# {{ index .Help "no-cache" }}
no-cache: false

# {{ index .Help "cache-path" }}
# cache-path: ""  # automatically set to XDG_DATA_HOME/mods if empty

# {{ index .Help "http-proxy" }}
# http-proxy: ""  # HTTP proxy for API requests

# {{ index .Help "max-retries" }}
max-retries: 5

# {{ index .Help "max-tool-rounds" }}
max-tool-rounds: 30

# {{ index .Help "reasoning" }}
reasoning: off

# {{ index .Help "review" }}
review-mode: mutable

# {{ index .Help "shell-classify-prompt" }}
# shell-classify-prompt: "Classify this shell command. Does it create, delete, or modify any files, directories, system settings, or persistent state? Answer only YES or NO. If unsure, answer YES."

# ── Tool & MCP Configuration ──────────────────────────────────────

# {{ index .Help "mcp-servers" }}
mcp-servers:
  # Example: GitHub MCP via Docker:
  # github:
  #   command: docker
  #   env:
  #     - GITHUB_PERSONAL_ACCESS_TOKEN=xxxyyy
  #   args:
  #     - run
  #     - "-i"
  #     - "--rm"
  #     - "-e"
  #     - GITHUB_PERSONAL_ACCESS_TOKEN
  #     - "ghcr.io/github/github-mcp-server"
  #
  # By default, mods filters obvious secrets out of the environment it
  # forwards to stdio MCP subprocesses (OPENAI_API_KEY, AWS_*,
  # GITHUB_TOKEN, MODS_*, anything matching *TOKEN/*SECRET/*PASSWORD/...).
  # The server's own env: block above is always forwarded verbatim, so
  # list only the variables the server actually needs. Set
  # pass-env-all: true to opt back into the legacy behaviour of leaking
  # the entire parent environment, only do that for fully trusted
  # local servers.
  #
  # For remote MCP servers (type: sse or http), URLs that target
  # loopback/private/link-local hosts are rejected. Set
  # MODS_MCP_ALLOW_PRIVATE=1 in the environment to opt in for local
  # development against a self-hosted MCP gateway.

# {{ index .Help "mcp-timeout" }}
mcp-timeout: 15s

# {{ index .Help "builtin-tools" }}
builtin-tools:
  filesystem: auto
  shell: false
  sequential-thinking: false
  shell-timeout: 30s
  shell-max-output: 20000
  workspace: ""  # root directory for filesystem/shell tools, defaults to CWD

# {{ index .Help "web-search" }}
web-search: false

# {{ index .Help "web-search-provider" }}
# Supported: duckduckgo (default), tavily, custom
web-search-provider: duckduckgo

# {{ index .Help "web-search-api-key" }}
# web-search-api-key:

# {{ index .Help "web-search-api-key-env" }}
# web-search-api-key-env: TAVILY_API_KEY

# ── Images ────────────────────────────────────────────────────────

# {{ index .Help "image" }}
# images: []

# {{ index .Help "stdin-image" }}
# stdin-image: false

# {{ index .Help "clipboard-image" }}
# clipboard-image: false

# ── Debug ─────────────────────────────────────────────────────────

# {{ index .Help "debug" }}
debug: false

# ══════════════════════════════════════════════════════════════════
#                               APIs
# ══════════════════════════════════════════════════════════════════

# {{ index .Help "apis" }}
apis:

  # ── Major Cloud Providers ─────────────────────────────────────

  openai:
    base-url: https://api.openai.com/v1
    api-key:
    api-key-env: OPENAI_API_KEY
    # api-key-cmd executes a shell command to retrieve the API key at runtime.
    # WARNING: Avoid using this with untrusted or shared config files, as the
    # command is executed via the shell. Prefer api-key-env when possible.
    # api-key-cmd: rbw get -f OPENAI_API_KEY chat.openai.com
    models:
      gpt-4o:
        aliases: ["4o"]
        max-input-chars: 392000
        fallback: gpt-4o-mini
      gpt-4o-mini:
        aliases: ["4o-mini", "mini"]
        max-input-chars: 392000
      o1:
        aliases: ["o1"]
        max-input-chars: 392000
      o1-mini:
        aliases: ["o1m"]
        max-input-chars: 392000
      o3-mini:
        aliases: ["o3m"]
        max-input-chars: 392000

  google:
    # Optional override of the Gemini streaming endpoint. The default,
    # built by google.DefaultConfig, is the public
    # generativelanguage.googleapis.com URL with the model path embedded.
    # When you set base-url here, mods uses it verbatim unless you include
    # the literal token {model} (path-escaped substitution), useful for a
    # multi-model proxy that mirrors Google's URL structure. Single-model
    # proxies should write the full URL without a placeholder.
    # base-url: https://my-vertex-proxy.example.com/v1beta/models/{model}:streamGenerateContent?alt=sse
    models:
      gemini-2.5-pro:
        aliases: ["gm2.5p", "gemini-pro"]
        max-input-chars: 4194304
      gemini-2.5-flash:
        aliases: ["gm2.5f", "gemini-flash"]
        max-input-chars: 4194304
      gemini-2.0-flash:
        aliases: ["gm2.0f"]
        max-input-chars: 4194304

  anthropic:
    base-url: https://api.anthropic.com/v1
    api-key:
    api-key-env: ANTHROPIC_API_KEY
    models:
      claude-3-5-sonnet-20241022:
        aliases: ["claude-3.5-sonnet", "sonnet-3.5", "sonnet"]
        max-input-chars: 800000
      claude-3-5-haiku-20241022:
        aliases: ["claude-3.5-haiku", "haiku-3.5", "haiku"]
        max-input-chars: 800000
      claude-3-opus-20240229:
        aliases: ["claude-3-opus", "opus-3", "opus"]
        max-input-chars: 800000

  # ── Enterprise / Alternative ──────────────────────────────────

  azure:
    base-url: https://YOUR_RESOURCE_NAME.openai.azure.com
    api-key:
    api-key-env: AZURE_OPENAI_KEY
    models:
      gpt-4o:
        aliases: ["az4o"]
        max-input-chars: 392000

  deepseek:
    base-url: https://api.deepseek.com/
    api-key:
    api-key-env: DEEPSEEK_API_KEY
    models:
      # DeepSeek models default to thinking ENABLED. mods actively sends
      # thinking.type: disabled when -T is off, and thinking.type: enabled
      # (the value below) when -T is on. No extra-params boilerplate needed.
      # See: https://api-docs.deepseek.com/guides/thinking_mode
      deepseek-reasoner:
        aliases: ["r1", "reasoner"]
        max-input-chars: 800000
        thinking-type: enabled
      deepseek-chat:
        aliases: ["chat", "v3"]
        max-input-chars: 800000

  # ── Chinese AI Providers (国内大模型) ──────────────────────────

  # 智谱 GLM (ZhipuAI)
  # Recent GLM models use thinking.type: "enabled" (Anthropic-style) and
  # return reasoning via the reasoning_content delta field (auto-captured).
  glm:
    base-url: https://open.bigmodel.cn/api/paas/v4
    api-key:
    api-key-env: ZAI_API_KEY
    models:
      glm-4-plus:
        aliases: ["glm", "glm4"]
        max-input-chars: 128000
        thinking-type: enabled
      glm-4-air:
        aliases: ["glm4-air"]
        max-input-chars: 128000

  # MiniMax
  # Uses thinking.type: "adaptive" (NOT "enabled") and inlines reasoning
  # in <think>...</think> tags within the content stream.
  minimax:
    base-url: https://api.minimaxi.com/v1
    api-key:
    api-key-env: MINIMAX_API_KEY
    models:
      MiniMax-Text-01:
        aliases: ["m1", "minimax"]
        max-input-chars: 800000
        thinking-type: adaptive

  # 通义千问 Qwen (Alibaba DashScope)
  # Two thinking modes: qwq (dedicated reasoning model, always thinks)
  # and qwen-plus (toggle via enable_thinking).
  qwen:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key:
    api-key-env: DASHSCOPE_API_KEY
    models:
      qwq-plus:
        aliases: ["qwq", "qwen-reasoner"]
        max-input-chars: 131072
      qwen-plus:
        aliases: ["qwen", "qp"]
        max-input-chars: 131072
        # enable_thinking toggles reasoning on this model; -T does not
        # toggle it for OpenAI-compatible endpoints. Switch to qwq-plus
        # for a model that only thinks on demand.
        extra-params:
          enable_thinking: true
      qwen-max:
        aliases: ["qmax"]
        max-input-chars: 131072
      qwen-turbo:
        aliases: ["qturbo"]
        max-input-chars: 131072

  # Kimi (Moonshot AI)
  # moonshot-v1 family does not expose thinking-mode controls.
  kimi:
    base-url: https://api.moonshot.cn/v1
    api-key:
    api-key-env: MOONSHOT_API_KEY
    models:
      moonshot-v1-128k:
        aliases: ["kimi128", "kimi"]
        max-input-chars: 128000
      moonshot-v1-32k:
        aliases: ["kimi32"]
        max-input-chars: 32000

  # ── Multi-provider Aggregator ─────────────────────────────────

  openrouter:
    base-url: https://openrouter.ai/api/v1
    api-key:
    api-key-env: OPENROUTER_API_KEY
    models:
      anthropic/claude-3.5-sonnet:
        aliases: ["or-sonnet"]
        max-input-chars: 800000
      google/gemini-2.5-pro:
        aliases: ["or-gemini-pro"]
        max-input-chars: 4194304
      deepseek/deepseek-chat:
        aliases: ["or-deepseek"]
        max-input-chars: 800000

  # ── Local / Self-hosted ───────────────────────────────────────

  ollama:
    base-url: http://localhost:11434
    models:
      "llama3.1":
        aliases: ["llama3.1", "llama"]
        max-input-chars: 392000
      "qwen2.5":
        aliases: ["qwen2.5"]
        max-input-chars: 131072
      "gemma2":
        aliases: ["gemma2", "gemma"]
        max-input-chars: 32000

  # Example: custom OpenAI-compatible server
  # custom:
  #   base-url: https://your-server.com/v1
  #   api-key:
  #   api-key-env: CUSTOM_API_KEY
  #   models:
  #     your-model:
  #       aliases: ["ym"]
  #       max-input-chars: 100000
  #
  #       # ── Reasoning / Thinking configuration ──
  #       # These fields control how -T / --reasoning on interacts with
  #       # the provider. All are optional with sensible defaults.
  #
  #       # thinking-type: the value to set thinking.type to when -T is on.
  #       # Default "adaptive" (MiniMax). Use "enabled" for GLM/Anthropic.
  #       thinking-type: enabled
  #
  #       # extra-params: arbitrary fields merged into the request body.
  #       # Set thinking.type: disabled here for "off by default, -T turns on".
  #       extra-params:
  #         thinking:
  #           type: disabled
  #
  #       # thought-fields: override the delta fields consulted for reasoning
  #       # content extraction. Default: [reasoning_content, reasoning,
  #       # thinking, thinking_content].
  #       # thought-fields: [my_custom_field]
  #
  #       # think-tag: override the inline reasoning tag name.
  #       # Default "think" → <think>...</think>. Only parsed when -T is on.
  #       # think-tag: reasoning
  #
  #       # reasoning-effort: target reasoning_effort value for -T.
  #       # Default "medium". Options: low, medium, high.
  #       # reasoning-effort: high
