# {{ index .Help "api" }}
default-api: openai
# {{ index .Help "model" }}
default-model: gpt-5.4

# ── Formatting ────────────────────────────────────────────────────

# {{ index .Help "format-text" }}
format-text:
  markdown: '{{ index .Config.FormatText "markdown" }}'
  json: '{{ index .Config.FormatText "json" }}'

# {{ index .Help "format" }}
format: false

# {{ index .Help "format-as" }}
# format-as: ""  # empty = let mods decide based on format-text keys

# {{ index .Help "minimal" }}
minimal: false

# ── Roles ─────────────────────────────────────────────────────────

# {{ index .Help "roles" }}
roles:
  "default": []
  # Example, a role called `shell`:
  # shell:
  #   - you are a shell expert
  #   - you do not explain anything
  #   - you simply output one liners to solve the problems you're asked
  #   - you do not provide any explanation whatsoever, ONLY the command

# {{ index .Help "role" }}
role: "default"

# ── Display & Output ──────────────────────────────────────────────

# {{ index .Help "raw" }}
raw: false

# {{ index .Help "quiet" }}
quiet: false

# {{ index .Help "hide-tool-status" }}
hide-tool-status: false

# {{ index .Help "word-wrap" }}
word-wrap: 80

# {{ index .Help "theme" }}
theme: charm

# {{ index .Help "status-text" }}
status-text: Generating

# ── Model Parameters ──────────────────────────────────────────────

# {{ index .Help "temp" }}
temp: 1.0

# {{ index .Help "topp" }}
topp: 1.0

# {{ index .Help "topk" }}
topk: 50

# {{ index .Help "stop" }}
# stop: []

# {{ index .Help "max-input-chars" }}
max-input-chars: 12250

# {{ index .Help "max-tokens" }}
# max-tokens: 100

# {{ index .Help "no-limit" }}
no-limit: false

# {{ index .Help "no-cache" }}
no-cache: false

# {{ index .Help "cache-path" }}
# cache-path: ""  # automatically set to XDG_DATA_HOME/mods if empty

# {{ index .Help "http-proxy" }}
# http-proxy: ""  # HTTP proxy for API requests

# {{ index .Help "max-retries" }}
max-retries: 5

# {{ index .Help "max-tool-rounds" }}
max-tool-rounds: 30

# {{ index .Help "reasoning" }}
reasoning: off

# {{ index .Help "review" }}
review-mode: mutable

# {{ index .Help "shell-classify-prompt" }}
# shell-classify-prompt: "Classify this shell command. Does it create, delete, or modify any files, directories, system settings, or persistent state? Answer only YES or NO. If unsure, answer YES."

# ── Tool & MCP Configuration ──────────────────────────────────────

# {{ index .Help "mcp-servers" }}
mcp-servers:
  # Example: GitHub MCP via Docker:
  # github:
  #   command: docker
  #   env:
  #     - GITHUB_PERSONAL_ACCESS_TOKEN=xxxyyy
  #   args:
  #     - run
  #     - "-i"
  #     - "--rm"
  #     - "-e"
  #     - GITHUB_PERSONAL_ACCESS_TOKEN
  #     - "ghcr.io/github/github-mcp-server"

# {{ index .Help "mcp-timeout" }}
mcp-timeout: 15s

# {{ index .Help "builtin-tools" }}
builtin-tools:
  filesystem: auto
  shell: false
  sequential-thinking: false
  shell-timeout: 30s
  shell-max-output: 20000
  workspace-root: ""  # root directory for filesystem/shell tools, defaults to CWD

# {{ index .Help "web-search" }}
web-search: false

# {{ index .Help "web-search-provider" }}
# Supported: duckduckgo (default), tavily, custom
web-search-provider: duckduckgo

# {{ index .Help "web-search-api-key" }}
# web-search-api-key:

# ── Images ────────────────────────────────────────────────────────

# {{ index .Help "image" }}
# images: []

# {{ index .Help "stdin-image" }}
# stdin-image: false

# {{ index .Help "clipboard-image" }}
# clipboard-image: false

# ── Debug ─────────────────────────────────────────────────────────

# {{ index .Help "debug" }}
debug: false

# ══════════════════════════════════════════════════════════════════
#                               APIs
# ══════════════════════════════════════════════════════════════════

# {{ index .Help "apis" }}
apis:

  # ── Major Cloud Providers ─────────────────────────────────────

  openai:
    base-url: https://api.openai.com/v1
    api-key:
    api-key-env: OPENAI_API_KEY
    # api-key-cmd executes a shell command to retrieve the API key at runtime.
    # WARNING: Avoid using this with untrusted or shared config files, as the
    # command is executed via the shell. Prefer api-key-env when possible.
    # api-key-cmd: rbw get -f OPENAI_API_KEY chat.openai.com
    models:
      gpt-5.5:
        aliases: ["5.5", "gpt5.5"]
        max-input-chars: 1000000
        fallback: gpt-5.4
      gpt-5.4:
        aliases: ["5.4", "gpt5.4"]
        max-input-chars: 1000000
        fallback: gpt-5.4-mini
      gpt-5.4-mini:
        aliases: ["5.4m", "gpt5.4m", "mini"]
        max-input-chars: 400000
        fallback: gpt-5.4

  google:
    models:
      gemini-3.5-flash:
        aliases: ["gm3.5f", "gemini-flash"]
        max-input-chars: 4194304
      gemini-3.1-pro:
        aliases: ["gm3.1p", "gemini-pro"]
        max-input-chars: 4194304
      gemini-2.5-pro:
        aliases: ["gm2.5p"]
        max-input-chars: 4194304

  anthropic:
    base-url: https://api.anthropic.com/v1
    api-key:
    api-key-env: ANTHROPIC_API_KEY
    models:
      claude-opus-4-8:
        aliases: ["claude-opus-4.8", "opus-4.8", "opus"]
        max-input-chars: 1000000
      claude-sonnet-4-6:
        aliases: ["claude-sonnet-4.6", "sonnet-4.6", "sonnet"]
        max-input-chars: 1000000
      claude-haiku-4-5-20251001:
        aliases: ["claude-haiku-4.5", "haiku-4.5", "haiku"]
        max-input-chars: 200000

  # ── Enterprise / Alternative ──────────────────────────────────

  azure:
    base-url: https://YOUR_RESOURCE_NAME.openai.azure.com
    api-key:
    api-key-env: AZURE_OPENAI_KEY
    models:
      gpt-5.4:
        aliases: ["az5.4"]
        max-input-chars: 1000000

  deepseek:
    base-url: https://api.deepseek.com/
    api-key:
    api-key-env: DEEPSEEK_API_KEY
    models:
      deepseek-v4-flash:
        aliases: ["v4-flash", "flash", "deepseek-chat", "chat"]
        max-input-chars: 1000000
        fallback: deepseek-v4-pro
      deepseek-v4-pro:
        aliases: ["v4-pro", "pro", "deepseek-reasoner", "r1"]
        max-input-chars: 1000000

  # ── Multi-provider Aggregator ─────────────────────────────────

  openrouter:
    base-url: https://openrouter.ai/api/v1
    api-key:
    api-key-env: OPENROUTER_API_KEY
    models:
      deepseek/deepseek-v4-flash:
        aliases: ["or-v4-flash"]
        max-input-chars: 1000000
      anthropic/claude-sonnet-4-6:
        aliases: ["or-sonnet-4.6"]
        max-input-chars: 1000000
      google/gemini-3.1-pro:
        aliases: ["or-gemini-pro"]
        max-input-chars: 4194304

  # ── Local / Self-hosted ───────────────────────────────────────

  ollama:
    base-url: http://localhost:11434
    models:
      "llama4:16x17b":
        aliases: ["llama4", "scout"]
        max-input-chars: 10000000
      "gemma4:12b":
        aliases: ["gemma4", "gemma"]
        max-input-chars: 1000000
      "qwen3.5:7b":
        aliases: ["qwen3.5", "qwen"]
        max-input-chars: 392000

  # Example: custom OpenAI-compatible server
  # custom:
  #   base-url: https://your-server.com/v1
  #   api-key:
  #   api-key-env: CUSTOM_API_KEY
  #   models:
  #     your-model:
  #       aliases: ["ym"]
  #       extra-params:   # pass arbitrary fields to the API request body
  #         thinking:
  #           type: disabled
  #       max-input-chars: 100000
  # Note: --reasoning / -T (and `reasoning: on|auto` in YAML) will override
  # `extra-params.thinking.type` from `disabled` to `adaptive` (the only
  # 'on' value accepted by MiniMax and similar Anthropic-style endpoints),
  # stripping any `budget_tokens`. It will also upgrade
  # `extra-params.reasoning_effort` to `medium`. So the values above only
  # apply when reasoning is off.
